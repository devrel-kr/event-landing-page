name: Issue Report
description: File a bug report, feature request, documentation issue, or regression.
title: "[Issue]: "
labels: ["triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this issue report! Please provide sufficient information so we can investigate effectively.
  - type: dropdown
    id: issue-type
    attributes:
      label: Issue Type
      description: What type of issue are you reporting?
      options:
        - Bug Report
        - Feature Request
        - Documentation Issue or Request
        - Regression (a behavior that used to work and stopped in a new release)
    validations:
      required: true
  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Minimal Steps to Reproduce
      description: Provide a minimal set of steps to reproduce the issue.
      placeholder: |
        1. Step one...
        2. Step two...
        3. ...
    validations:
      required: false
  - type: textarea
    id: log-messages
    attributes:
      label: Any Log Messages Given by the Failure
      description: Please copy and paste any relevant log output. This will be automatically formatted into code, so no need for backticks.
      render: shell
    validations:
      required: false
  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected/Desired Behavior
      description: A concise description of what you expected to happen.
    validations:
      required: false
  - type: input
    id: os-version
    attributes:
      label: OS and Version
      description: "What OS and version are you using?"
      placeholder: "e.g., Windows 10, Ubuntu 22.04, macOS Ventura"
    validations:
      required: false
  - type: input
    id: versions
    attributes:
      label: Versions
      description: What version of the software are you running?
      placeholder: "e.g., 1.0.0"
    validations:
      required: false
  - type: textarea
    id: additional-details
    attributes:
      label: Additional Details
      description: |
        Mention any other details that might be useful.

        Tip: You can attach images or log files by clicking this area to highlight it and then dragging files in.
    validations:
      required: false
